<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Edición Vanilla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <div class="container nav-wrapper">
        <h2 class="logo">TechStore</h2>
        <div class="cart-badge">Items: <span id="cart-count">0</span></div>
    </div>
</header>

<main class="container">
    <h1 class="page-title">Catálogo de Productos</h1>

    <div class="filter-controls">
        <button class="btn-filter active" onclick="filterProducts('all', this)">Mostrar todos</button>
        <button class="btn-filter" onclick="filterProducts('Celulares', this)">Celulares</button>
        <button class="btn-filter" onclick="filterProducts('Laptops', this)">Laptops</button>
        <button class="btn-filter" onclick="filterProducts('Accesorios', this)">Accesorios</button>
    </div>

    <div class="products-grid" id="product-list">
        </div>

    <hr class="divider">

    <section class="cart-container">
        <h2 class="cart-title">🛒 Carrito de Compras</h2>
        <div id="cart-items">
            </div>
        
        <div class="cart-summary">
            <h3>Total: <span id="total-price">$0.00</span></h3>
            <div class="action-buttons">
                <button class="btn-danger" id="clear-cart-button">Vaciar carrito</button>
                <button class="btn-success" id="checkout-button">Proceder al pago</button>
            </div>
        </div>
    </section>
</main>

<footer class="main-footer">
    <p>© 2026 TechStore - Proyecto Profesional</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const products = [
            { id: 1, name: "Funda Personalizada", price: 2000, image: "images/funda.jpg", category: "Celulares" },
            { id: 2, name: "Cargador Tipo C Rápido", price: 5000, image: "images/cargador.jpg", category: "Celulares" },
            { id: 3, name: "Teclado Mecánico RGB", price: 2500, image: "images/teclado.jpg", category: "Laptops" },
            { id: 4, name: "Mouse Gamer Pro", price: 4500, image: "images/mouse.jpg", category: "Laptops" },
            { id: 5, name: "Auriculares Noise Cancelling", price: 1500, image: "images/auriculares.jpg", category: "Accesorios" },
            { id: 6, name: "Kit de Limpieza Tech", price: 1000, image: "images/kit.jpg", category: "Accesorios" }
        ];

        const productContainer = document.getElementById("product-list");
        const cartContainer = document.getElementById("cart-items");
        const totalPriceElement = document.getElementById("total-price");
        const cartCountElement = document.getElementById("cart-count");

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        window.filterProducts = function(category, btn) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filtered = category === 'all' ? products : products.filter(p => p.category === category);
            
            productContainer.innerHTML = "";
            filtered.forEach(p => {
                productContainer.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="card-info">
                            <h3>${p.name}</h3>
                            <p class="price">$${p.price}</p>
                            <span class="category-tag">${p.category}</span>
                            <button class="btn-add" onclick="addToCart(${p.id})">Agregar al carrito</button>
                        </div>
                    </div>
                `;
            });
        };

        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            saveAndRender();
        };

        window.removeFromCart = function(id) {
            cart = cart.filter(item => item.id !== id);
            saveAndRender();
        };

        function saveAndRender() {
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            cartContainer.innerHTML = cart.length === 0 ? '<p class="empty-msg">Tu carrito está vacío.</p>' : '';
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                cartContainer.innerHTML += `
                    <div class="cart-item">
                        <div class="item-details">
                            <strong>${item.name}</strong>
                            <span>$${item.price} x ${item.qty}</span>
                        </div>
                        <button class="btn-remove" onclick="removeFromCart(${item.id})">Eliminar</button>
                    </div>
                `;
            });

            totalPriceElement.textContent = `$${total.toFixed(2)}`;
            cartCountElement.textContent = count;
        }

        document.getElementById("clear-cart-button").addEventListener("click", () => {
            if(confirm("¿Vaciar carrito?")) { cart = []; saveAndRender(); }
        });

        document.getElementById("checkout-button").addEventListener("click", () => {
            if(cart.length > 0) {
                alert("Total: " + totalPriceElement.textContent);
                cart = []; saveAndRender();
            }
        });

        filterProducts('all', document.querySelector('.btn-filter'));
        renderCart();
    });
</script>
</body>
</html>
