<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airsoft Zone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between">
            <h2>Airsoft Zone</h2>
            <nav>
                <a href="#" class="text-white me-3">Inicio</a>
                <a href="#" class="text-white">Carrito</a>
            </nav>
        </div>
    </header>

    <div class="container mt-5">

        <h1 class="text-center mb-4">Productos de Airsoft</h1>

        <div class="row" id="product-list"></div>

        <hr class="my-5">

        <h2>Carrito de Compras</h2>

        <div id="cart-items"></div>

        <p class="mt-3">Total: <span id="total-price">$0.00</span></p>

        <button class="btn btn-success" id="checkout-button">Proceder al pago</button>
        <button class="btn btn-danger" id="clear-cart-button">Vaciar carrito</button>

    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <p>© copy 2026 Airsoft Zone</p>
    </footer>

    <script>

        document.addEventListener("DOMContentLoaded", () => {

            const products = [
                { id: 1, name: "FN Five Seven", price: 2000, image: "images/57.jpg" },
                { id: 2, name: "FN P90", price: 5000, image: "images/p90.jpg" },
                { id: 3, name: "Desert Eagle", price: 2500, image: "images/eagle50.jpg" },
                { id: 4, name: "MP5 A3", price: 4500, image: "images/mp5.jpeg" },
                { id: 5, name: "Glock 18", price: 1500, image: "images/glock.jpg" },
                { id: 6, name: "Remington Escopeta", price: 1000, image: "images/remington.jpg" }
            ];

            const productContainer = document.getElementById("product-list");
            const cartContainer = document.getElementById("cart-items");
            const totalPriceElement = document.getElementById("total-price");

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            products.forEach(product => {

                const card = `
<div class="col-md-4">
<div class="card p-3 mb-3">

<img src="${product.image}" class="img-fluid">

<h3>${product.name}</h3>

<p>$${product.price}</p>

<button class="btn btn-primary"
onclick="addToCart(${product.id})">
Agregar al carrito
</button>

</div>
</div>
`;

                productContainer.innerHTML += card;

            });

            window.addToCart = function (id) {

                const product = products.find(p => p.id === id);

                const existing = cart.find(item => item.product.id === id);

                if (existing) {
                    existing.quantity++;
                } else {
                    cart.push({ product: product, quantity: 1 });
                }

                localStorage.setItem("cart", JSON.stringify(cart));

                renderCart();

            };

            window.removeFromCart = function (id) {

                cart = cart.filter(item => item.product.id !== id);

                localStorage.setItem("cart", JSON.stringify(cart));

                renderCart();

            };

            function renderCart() {

                cartContainer.innerHTML = "";

                let total = 0;

                cart.forEach(item => {

                    const cartItem = `
<div class="border p-2 mb-2">

<h4>${item.product.name}</h4>

<p>$${item.product.price}</p>

<p>Cantidad: ${item.quantity}</p>

<button class="btn btn-danger"
onclick="removeFromCart(${item.product.id})">
Eliminar
</button>

</div>
`;

                    cartContainer.innerHTML += cartItem;

                    total += item.product.price * item.quantity;

                });

                totalPriceElement.textContent = "$" + total.toFixed(2);

            }

            document.getElementById("clear-cart-button").addEventListener("click", () => {

                cart = [];

                localStorage.setItem("cart", JSON.stringify(cart));

                renderCart();

            });

            document.getElementById("checkout-button").addEventListener("click", () => {

                alert("Total a pagar: " + totalPriceElement.textContent);

            });

            renderCart();

        });

    </script>

</body>

</html>
